<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily News Decode</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f6f1e9; }
        .section-label { font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; }
        #featured-news-container { margin-bottom: 40px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .grid-card { border: 1px solid #ccc; padding: 15px; text-decoration: none; color: #333; background: #fff; }
    </style>
</head>
<body>

    <div class="section-label">Today's Highlight</div>
    <div id="featured-news-container">
        <p>รออัปเดตข่าวเด่นประจำวัน...</p>
    </div>

    <div class="section-label">Latest News</div>
    <div class="news-grid">
    </div>

</body>
</html>
